<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background circle -->
  <circle cx="64" cy="64" r="62" fill="#0a0a0f" stroke="#ff2d78" stroke-width="2"/>
  
  <!-- Microphone capsule -->
  <path d="M 64 25 C 75.05 25 84 33.95 84 45 L 84 65 C 84 76.05 75.05 85 64 85 C 52.95 85 44 76.05 44 65 L 44 45 C 44 33.95 52.95 25 64 25 Z" 
        fill="none" stroke="#ff2d78" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Microphone stand -->
  <line x1="64" y1="85" x2="64" y2="100" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Base of stand -->
  <ellipse cx="64" cy="102" rx="14" ry="3" fill="none" stroke="#ff2d78" stroke-width="2"/>
  
  <!-- Optimization spark - upper right -->
  <g transform="translate(88, 32)">
    <circle cx="0" cy="0" r="1.5" fill="#ff2d78"/>
    <!-- Vertical line -->
    <line x1="0" y1="-10" x2="0" y2="-15" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Horizontal line -->
    <line x1="-10" y1="0" x2="-15" y2="0" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="0" x2="15" y2="0" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Sound wave lines - left side -->
  <path d="M 32 55 Q 25 48 18 55" stroke="#ff2d78" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 32 70 Q 25 63 18 70" stroke="#ff2d78" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Small accent dots -->
  <circle cx="26" cy="32" r="1" fill="#ff2d78" opacity="0.5"/>
  <circle cx="102" cy="92" r="1" fill="#ff2d78" opacity="0.5"/>
</svg>